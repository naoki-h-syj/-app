<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="照合アプリ">
<title>照合アプリ</title>

<!-- ZXing：1次元バーコード＋QRコード両対応 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/zxing-js/0.20.0/zxing.min.js"></script>

<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --border: #2a2d3e;
  --accent: #4f8ef7;
  --text: #e8eaf0;
  --text-sub: #8b8fa8;
  --ok: #22c55e;
  --ng: #ef4444;
  --warn: #f59e0b;
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

#app {
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
  max-width: 600px;
  margin: 0 auto;
  padding: 16px 16px calc(env(safe-area-inset-bottom, 16px) + 16px);
}

/* ヘッダー */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0 16px;
}
.header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.04em; }
.step-badge {
  background: var(--accent);
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
}

/* ステップインジケーター */
.steps {
  display: flex;
  align-items: center;
  margin-bottom: 20px;
}
.step-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.step-circle {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700;
  border: 2px solid var(--border);
  background: var(--surface);
  color: var(--text-sub);
  transition: all 0.3s;
}
.step-circle.active { border-color: var(--accent); background: var(--accent); color: #fff; }
.step-circle.done   { border-color: var(--ok);    background: var(--ok);    color: #fff; }
.step-label { font-size: 10px; color: var(--text-sub); text-align: center; line-height: 1.3; }
.step-label.active { color: var(--accent); font-weight: 700; }
.step-label.done   { color: var(--ok); }
.step-line { flex: 0.3; height: 2px; background: var(--border); margin-bottom: 20px; transition: background 0.3s; }
.step-line.done { background: var(--ok); }

/* カード */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.card-title { font-size: 15px; font-weight: 700; }
.card-sub   { font-size: 12px; color: var(--text-sub); line-height: 1.6; margin-top: -4px; }

/* カメラ映像 */
.cam-wrap {
  position: relative;
  width: 100%;
  border-radius: 12px;
  overflow: hidden;
  background: #000;
}
.cam-wrap video {
  width: 100%;
  display: block;
  border-radius: 12px;
}
/* スキャン枠オーバーレイ */
.scan-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
.scan-frame-bar {
  width: 80%; height: 60px;
  border: 2px solid var(--accent);
  border-radius: 6px;
  box-shadow: 0 0 0 2000px rgba(0,0,0,0.35);
}
.scan-frame-qr {
  width: 65%; aspect-ratio: 1;
  border: 2px solid var(--accent);
  border-radius: 6px;
  box-shadow: 0 0 0 2000px rgba(0,0,0,0.35);
}
/* スキャンライン */
.scan-line {
  position: absolute;
  left: 10%; right: 10%;
  height: 2px;
  background: var(--accent);
  opacity: 0.8;
  animation: scanMove 2s ease-in-out infinite;
}
@keyframes scanMove {
  0%   { top: 20%; }
  50%  { top: 75%; }
  100% { top: 20%; }
}

/* 取得済み表示 */
.scanned-value {
  background: rgba(79,142,247,0.1);
  border: 1px solid rgba(79,142,247,0.3);
  border-radius: 10px;
  padding: 12px 16px;
}
.scanned-value .lbl { font-size: 10px; color: var(--accent); font-weight: 700; letter-spacing: 0.08em; margin-bottom: 4px; }
.scanned-value .val { font-size: 16px; font-weight: 700; font-family: monospace; word-break: break-all; }

/* ボタン */
.btn {
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  letter-spacing: 0.04em;
}
.btn:active { opacity: 0.8; transform: scale(0.98); }
.btn-primary   { background: var(--accent); color: #fff; }
.btn-secondary { background: var(--border); color: var(--text); }
.btn:disabled  { opacity: 0.4; cursor: not-allowed; }

/* メッセージ */
.msg {
  font-size: 13px; padding: 10px 14px;
  border-radius: 8px; line-height: 1.5;
}
.msg.warn { background: rgba(245,158,11,0.15); color: var(--warn); border: 1px solid rgba(245,158,11,0.3); }
.msg.info { background: rgba(79,142,247,0.10); color: var(--accent); border: 1px solid rgba(79,142,247,0.2); }

/* 結果オーバーレイ */
#result-screen {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  overflow-y: auto;
}
#result-screen.show { display: flex; }
#result-screen.ok   { background: #052e16; }
#result-screen.ng   { background: #2d0707; }

.result-icon  { font-size: 80px; line-height: 1; margin-bottom: 12px; }
.result-label { font-size: 64px; font-weight: 900; letter-spacing: 0.1em; margin-bottom: 20px; }
.result-label.ok { color: var(--ok); }
.result-label.ng { color: var(--ng); }

.result-detail {
  background: rgba(255,255,255,0.07);
  border-radius: 12px;
  padding: 16px 20px;
  width: 100%; max-width: 400px;
  margin-bottom: 28px;
}
.result-detail .row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.08); gap: 12px;
}
.result-detail .row:last-child { border-bottom: none; }
.result-detail .row .rl { font-size: 11px; color: rgba(255,255,255,0.5); flex-shrink: 0; }
.result-detail .row .rv { font-size: 13px; font-weight: 700; font-family: monospace; color: #fff; word-break: break-all; text-align: right; }

.btn-reset {
  width: 100%; max-width: 400px;
  padding: 18px; border-radius: 14px;
  border: 2px solid rgba(255,255,255,0.25);
  background: transparent; color: #fff;
  font-size: 17px; font-weight: 700; cursor: pointer;
}
.btn-reset:active { background: rgba(255,255,255,0.1); }

/* ローディング */
.loading-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(15,17,23,0.85);
  z-index: 200;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
}
.loading-overlay.show { display: flex; }
.spinner {
  width: 44px; height: 44px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--text-sub); font-size: 14px; }

/* 手入力モーダル */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 300;
  align-items: flex-end; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 24px 20px calc(env(safe-area-inset-bottom,0px) + 32px);
  width: 100%; max-width: 600px;
}
.modal-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.modal-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 18px;
  color: var(--text);
  font-family: monospace;
  outline: none;
  margin-bottom: 12px;
  letter-spacing: 0.05em;
}
.modal-input:focus { border-color: var(--accent); }
.modal-btns { display: flex; gap: 10px; }
.modal-btns .btn { flex: 1; }
</style>
</head>
<body>
<div id="app">

  <!-- ヘッダー -->
  <div class="header">
    <h1>📦 照合アプリ</h1>
    <div class="step-badge" id="step-badge">STEP 1 / 2</div>
  </div>

  <!-- ステップインジケーター -->
  <div class="steps">
    <div class="step-item">
      <div class="step-circle active" id="sc1">1</div>
      <div class="step-label active" id="sl1">送り状<br>バーコード</div>
    </div>
    <div class="step-line" id="line1"></div>
    <div class="step-item">
      <div class="step-circle" id="sc2">2</div>
      <div class="step-label" id="sl2">荷物<br>QRコード</div>
    </div>
    <div class="step-line" id="line2"></div>
    <div class="step-item">
      <div class="step-circle" id="sc3">✓</div>
      <div class="step-label" id="sl3">照合<br>結果</div>
    </div>
  </div>

  <!-- STEP1：バーコード -->
  <div class="card" id="step1-card">
    <div class="card-title">STEP 1：送り状バーコードをスキャン</div>
    <div class="card-sub">送り状のバーコードを枠内に合わせてください</div>
    <div class="cam-wrap">
      <video id="bar-video" autoplay playsinline muted></video>
      <div class="scan-overlay">
        <div style="position:relative; width:80%; height:60px;">
          <div class="scan-frame-bar" style="width:100%;height:100%;border:2px solid var(--accent);border-radius:6px;box-shadow:0 0 0 2000px rgba(0,0,0,0.35);"></div>
          <div class="scan-line"></div>
        </div>
      </div>
    </div>
    <div id="mondban-display" style="display:none" class="scanned-value">
      <div class="lbl">取得した問番</div>
      <div class="val" id="mondban-val">—</div>
    </div>
    <div id="bar-msg"></div>
    <button class="btn btn-secondary" onclick="openManual('mondban')">⌨️ 手入力する</button>
    <button class="btn btn-primary" id="btn-step2" onclick="goStep2()" disabled>次へ → QRコードをスキャン</button>
  </div>

  <!-- STEP2：QRコード -->
  <div class="card" id="step2-card" style="display:none">
    <div class="card-title">STEP 2：荷物のQRコードをスキャン</div>
    <div class="card-sub">荷物に貼付されたQRコードを枠内に合わせてください</div>
    <div class="cam-wrap">
      <video id="qr-video" autoplay playsinline muted></video>
      <div class="scan-overlay">
        <div style="position:relative; width:65%; aspect-ratio:1;">
          <div style="width:100%;height:100%;border:2px solid var(--accent);border-radius:6px;box-shadow:0 0 0 2000px rgba(0,0,0,0.35);"></div>
        </div>
      </div>
    </div>
    <div id="juchu-display" style="display:none" class="scanned-value">
      <div class="lbl">取得した受注番号</div>
      <div class="val" id="juchu-val">—</div>
    </div>
    <div id="qr-msg"></div>
    <button class="btn btn-secondary" onclick="openManual('juchu')">⌨️ 手入力する</button>
    <button class="btn btn-primary" id="btn-check" onclick="doCheck()" disabled>照合する</button>
    <button class="btn btn-secondary" onclick="goStep1()">← 戻る</button>
  </div>

</div><!-- /app -->

<!-- 結果 -->
<div id="result-screen">
  <div class="result-icon" id="r-icon">✅</div>
  <div class="result-label" id="r-label">OK</div>
  <div class="result-detail">
    <div class="row"><span class="rl">スキャン問番</span><span class="rv" id="r-scan">—</span></div>
    <div class="row"><span class="rl">登録問番</span><span class="rv" id="r-reg">—</span></div>
    <div class="row"><span class="rl">受注番号</span><span class="rv" id="r-juchu">—</span></div>
  </div>
  <button class="btn-reset" onclick="resetAll()">🔄 次の照合へ</button>
</div>

<!-- ローディング -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">照合中…</div>
</div>

<!-- 手入力モーダル -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <h3 id="modal-title">手入力</h3>
    <input type="text" class="modal-input" id="modal-input"
      autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary"   onclick="confirmModal()">確定</button>
    </div>
  </div>
</div>

<script>
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbztQIFelioCi16ap4k2sfBBxtnQffjqij4mnTAmRjzN_vxLsG4D_NfEMU_JuRSL-X_A/exec';
// ============================================================

let mondban  = '';
let juchuBan = '';
let manualTarget = '';
let audioCtx = null;
let barStream = null;
let qrStream  = null;
let barTimer  = null;
let qrTimer   = null;

// ── Audio ──────────────────────────────────────────
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playOK() {
  initAudio();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.value = 880; o.type = 'sine';
  g.gain.setValueAtTime(0.4, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
  o.start(); o.stop(audioCtx.currentTime + 0.5);
}
function playNG() {
  initAudio();
  [0, 0.35, 0.7].forEach(t => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = 440; o.type = 'square';
    g.gain.setValueAtTime(0.4, audioCtx.currentTime + t);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + t + 0.25);
    o.start(audioCtx.currentTime + t);
    o.stop(audioCtx.currentTime + t + 0.3);
  });
}

// ── ZXing スキャナ共通 ─────────────────────────────
async function startCamera(videoEl, hints) {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
  });
  videoEl.srcObject = stream;
  await videoEl.play();
  return stream;
}

function stopStream(stream, timer) {
  if (timer) clearInterval(timer);
  if (stream) stream.getTracks().forEach(t => t.stop());
}

// バーコードスキャン開始（ZXing MultiFormatReader）
async function startBarScanner() {
  const video = document.getElementById('bar-video');
  try {
    barStream = await startCamera(video);
    const hints = new Map();
    const formats = [
      ZXing.BarcodeFormat.CODE_128,
      ZXing.BarcodeFormat.CODE_39,
      ZXing.BarcodeFormat.ITF,
      ZXing.BarcodeFormat.EAN_13,
      ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.UPC_A,
      ZXing.BarcodeFormat.QR_CODE,
    ];
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    const reader = new ZXing.MultiFormatReader();
    reader.setHints(hints);

    barTimer = setInterval(() => {
      if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
      try {
        const canvas = document.createElement('canvas');
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const imgData = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height);
        const lum = new ZXing.RGBLuminanceSource(imgData.data, canvas.width, canvas.height);
        const bmp = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(lum));
        const result = reader.decode(bmp);
        if (result) {
          initAudio();
          setMondban(result.getText().trim());
        }
      } catch(e) { /* not found yet */ }
    }, 200);
  } catch(err) {
    document.getElementById('bar-msg').innerHTML =
      '<div class="msg warn">カメラ起動に失敗しました。手入力をご利用ください。</div>';
  }
}

// QRコードスキャン開始
async function startQRScanner() {
  const video = document.getElementById('qr-video');
  try {
    qrStream = await startCamera(video);
    const hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.QR_CODE]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    const reader = new ZXing.MultiFormatReader();
    reader.setHints(hints);

    qrTimer = setInterval(() => {
      if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
      try {
        const canvas = document.createElement('canvas');
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const imgData = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height);
        const lum = new ZXing.RGBLuminanceSource(imgData.data, canvas.width, canvas.height);
        const bmp = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(lum));
        const result = reader.decode(bmp);
        if (result) {
          initAudio();
          // スペース区切りの第1フィールドを受注番号として取得・先頭の「"」を除去
          const raw = result.getText().trim();
          const juchu = raw.split(/\s+/)[0].replace(/^["']/, '');
          setJuchu(juchu);
        }
      } catch(e) { /* not found yet */ }
    }, 200);
  } catch(err) {
    document.getElementById('qr-msg').innerHTML =
      '<div class="msg warn">カメラ起動に失敗しました。手入力をご利用ください。</div>';
  }
}

// ── 値セット ───────────────────────────────────────
function setMondban(val) {
  if (mondban) return; // 二重取得防止
  mondban = val;
  stopStream(barStream, barTimer); barStream = null; barTimer = null;
  document.getElementById('mondban-val').textContent = val;
  document.getElementById('mondban-display').style.display = 'block';
  document.getElementById('btn-step2').disabled = false;
}

function setJuchu(val) {
  if (juchuBan) return; // 二重取得防止
  juchuBan = val;
  stopStream(qrStream, qrTimer); qrStream = null; qrTimer = null;
  document.getElementById('juchu-val').textContent = val;
  document.getElementById('juchu-display').style.display = 'block';
  document.getElementById('btn-check').disabled = false;
}

// ── ステップ遷移 ───────────────────────────────────
function goStep2() {
  initAudio();
  document.getElementById('step1-card').style.display = 'none';
  document.getElementById('step2-card').style.display = 'flex';
  document.getElementById('sc1').className = 'step-circle done';
  document.getElementById('sl1').className = 'step-label done';
  document.getElementById('line1').className = 'step-line done';
  document.getElementById('sc2').className = 'step-circle active';
  document.getElementById('sl2').className = 'step-label active';
  document.getElementById('step-badge').textContent = 'STEP 2 / 2';
  startQRScanner();
}

function goStep1() {
  stopStream(qrStream, qrTimer); qrStream = null; qrTimer = null;
  juchuBan = '';
  document.getElementById('juchu-display').style.display = 'none';
  document.getElementById('btn-check').disabled = true;
  document.getElementById('step2-card').style.display = 'none';
  document.getElementById('step1-card').style.display = 'flex';
  document.getElementById('sc1').className = 'step-circle active';
  document.getElementById('sl1').className = 'step-label active';
  document.getElementById('line1').className = 'step-line';
  document.getElementById('sc2').className = 'step-circle';
  document.getElementById('sl2').className = 'step-label';
  document.getElementById('step-badge').textContent = 'STEP 1 / 2';
  startBarScanner();
}

// ── 照合 ───────────────────────────────────────────
async function doCheck() {
  initAudio();
  document.getElementById('loading').classList.add('show');
  try {
    const res  = await fetch(`${GAS_URL}?juchu=${encodeURIComponent(juchuBan)}`);
    const data = await res.json();
    document.getElementById('loading').classList.remove('show');
    if (data.status === 'found') {
      showResult(data.mondban.trim() === mondban.trim(), mondban, data.mondban.trim(), juchuBan);
    } else {
      showResult(false, mondban, '（未登録）', juchuBan);
    }
  } catch(e) {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('qr-msg').innerHTML =
      '<div class="msg warn">スプレッドシートへの接続に失敗しました。</div>';
  }
}

function showResult(isOK, scanM, regM, juchu) {
  const s = document.getElementById('result-screen');
  s.className = `show ${isOK ? 'ok' : 'ng'}`;
  document.getElementById('r-icon').textContent  = isOK ? '✅' : '❌';
  document.getElementById('r-label').textContent = isOK ? 'OK' : 'NG';
  document.getElementById('r-label').className   = `result-label ${isOK ? 'ok' : 'ng'}`;
  document.getElementById('r-scan').textContent  = scanM;
  document.getElementById('r-reg').textContent   = regM;
  document.getElementById('r-juchu').textContent = juchu;
  document.getElementById('sc2').className = 'step-circle done';
  document.getElementById('sl2').className = 'step-label done';
  document.getElementById('line2').className = 'step-line done';
  document.getElementById('sc3').className = 'step-circle done';
  document.getElementById('sl3').className = 'step-label done';
  isOK ? playOK() : playNG();
}

function resetAll() {
  stopStream(barStream, barTimer); barStream = null; barTimer = null;
  stopStream(qrStream,  qrTimer);  qrStream  = null; qrTimer  = null;
  mondban = ''; juchuBan = '';
  document.getElementById('result-screen').className = '';
  document.getElementById('mondban-display').style.display = 'none';
  document.getElementById('juchu-display').style.display   = 'none';
  document.getElementById('btn-step2').disabled = true;
  document.getElementById('btn-check').disabled = true;
  document.getElementById('step2-card').style.display = 'none';
  document.getElementById('step1-card').style.display = 'flex';
  document.getElementById('bar-msg').innerHTML = '';
  document.getElementById('qr-msg').innerHTML  = '';
  document.getElementById('sc1').className = 'step-circle active';
  document.getElementById('sl1').className = 'step-label active';
  ['sc2','sc3'].forEach(id => { document.getElementById(id).className = 'step-circle'; });
  ['sl2','sl3'].forEach(id => { document.getElementById(id).className = 'step-label'; });
  ['line1','line2'].forEach(id => { document.getElementById(id).className = 'step-line'; });
  document.getElementById('step-badge').textContent = 'STEP 1 / 2';
  startBarScanner();
}

// ── 手入力モーダル ─────────────────────────────────
function openManual(target) {
  initAudio();
  manualTarget = target;
  document.getElementById('modal-title').textContent =
    target === 'mondban' ? '問番を手入力' : '受注番号を手入力';
  document.getElementById('modal-input').value = '';
  document.getElementById('modal-input').placeholder =
    target === 'mondban' ? '例：1234-567890A' : '例：92603-050363A';
  document.getElementById('modal').classList.add('show');
  setTimeout(() => document.getElementById('modal-input').focus(), 150);
}
function closeModal() {
  document.getElementById('modal').classList.remove('show');
  document.getElementById('modal-input').blur();
}
function confirmModal() {
  const val = document.getElementById('modal-input').value.trim();
  if (!val) return;
  manualTarget === 'mondban' ? setMondban(val) : setJuchu(val);
  closeModal();
}
document.getElementById('modal-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmModal();
});
// モーダル外タップで閉じる
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// ── 起動 ──────────────────────────────────────────
window.addEventListener('load', startBarScanner);
</script>
</body>
