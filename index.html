<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>検品アプリ</title>
<style>
  :root{
    --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3348;
    --accent:#3d7fff;--accent-glow:rgba(61,127,255,.18);
    --ok:#22c55e;--ok-glow:rgba(34,197,94,.18);
    --ng:#ef4444;--ng-glow:rgba(239,68,68,.18);
    --warn:#f59e0b;--warn-glow:rgba(245,158,11,.18);
    --text:#e8eaf2;--text2:#8b90a8;
    --radius:14px;--radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,'Hiragino Kaku Gothic ProN',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

  header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  header h1{font-size:16px;font-weight:700}
  .badge{font-size:11px;background:var(--accent-glow);color:var(--accent);border:1px solid var(--accent);border-radius:20px;padding:3px 10px;font-weight:600}

  /* ページ */
  .page{display:none;flex-direction:column;flex:1;overflow:hidden}
  .page.active{display:flex}

  /* ========== 検品ページレイアウト ========== */
  #page-scan{padding:10px;gap:8px}

  /* ステータスバー */
  #sheet-status-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;font-size:12px;display:flex;align-items:center;gap:8px;flex-shrink:0}
  #sheet-status-bar .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

  /* 送り状表示 */
  #bc-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0}
  #bc-bar .label{font-size:11px;color:var(--text2);flex-shrink:0}
  #bc-bar .val{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;flex:1}
  #bc-bar .val.ph{color:var(--text2);font-weight:400;font-size:13px}
  #bc-bar .step-pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;flex-shrink:0}
  .pill-step1{background:var(--accent-glow);color:var(--accent);border:1px solid var(--accent)}
  .pill-step2{background:var(--ok-glow);color:var(--ok);border:1px solid var(--ok)}

  /* カメラ — 固定高さで小さめに */
  #camera-area{flex-shrink:0}
  #scanner-wrap{position:relative;background:#000;border-radius:var(--radius-sm);overflow:hidden;height:200px;border:2px solid var(--accent);transition:border-color .2s}
  #scanner-wrap video{width:100%;height:100%;object-fit:cover;display:block}
  .scan-guide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
  #scan-frame{border:2px solid rgba(61,127,255,.9);border-radius:6px;position:relative;transition:all .3s}
  .frame-bar{width:82%;height:40%}
  .frame-qr{width:50%;height:80%}
  #scan-frame::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:sline 1.6s ease-in-out infinite}
  @keyframes sline{0%,100%{top:0}50%{top:100%}}
  .camera-hint{position:absolute;bottom:0;left:0;right:0;text-align:center;font-size:11px;color:rgba(255,255,255,.92);background:rgba(0,0,0,.65);padding:5px}
  .border-ok{border-color:var(--ok)!important;animation:fok .45s ease}
  .border-ng{border-color:var(--ng)!important;animation:fng .45s ease}
  @keyframes fok{50%{box-shadow:0 0 0 4px var(--ok-glow)}}
  @keyframes fng{50%{box-shadow:0 0 0 4px var(--ng-glow)}}

  /* 結果パネル — タップで次へ */
  #result-area{flex:1;display:flex;flex-direction:column;gap:8px;min-height:0}

  /* 待機状態 */
  #result-idle{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
  #result-idle .idle-icon{font-size:36px;opacity:.4}
  #result-idle .idle-text{font-size:13px;color:var(--text2)}

  /* OK/NG タップパネル */
  #result-tap{flex:1;border-radius:var(--radius);border:3px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;user-select:none;transition:opacity .1s;-webkit-tap-highlight-color:transparent;display:none;animation:popin .25s cubic-bezier(.34,1.56,.64,1)}
  #result-tap:active{opacity:.8}
  @keyframes popin{from{transform:scale(.93);opacity:0}to{transform:scale(1);opacity:1}}
  #result-tap.ok{background:var(--ok-glow);border-color:var(--ok)}
  #result-tap.ng{background:var(--ng-glow);border-color:var(--ng)}
  #result-tap .tap-icon{font-size:42px}
  #result-tap .tap-title{font-size:22px;font-weight:800}
  #result-tap.ok .tap-title{color:var(--ok)}
  #result-tap.ng .tap-title{color:var(--ng)}
  #result-tap .tap-detail{font-size:12px;color:var(--text2);text-align:center;line-height:1.6;padding:0 16px}
  #result-tap .tap-next{font-size:11px;margin-top:4px;opacity:.6}
  #result-tap.ok .tap-next{color:var(--ok)}
  #result-tap.ng .tap-next{color:var(--ng)}

  /* やり直しボタン */
  #btn-reset-wrap{flex-shrink:0;display:flex;gap:8px}
  .btn{width:100%;padding:12px;border-radius:var(--radius);border:none;font-size:14px;font-weight:700;cursor:pointer;transition:all .12s}
  .btn:active{transform:scale(.97)}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
  .btn-danger{background:rgba(239,68,68,.15);color:var(--ng);border:1px solid var(--ng)}
  .btn-primary{background:var(--accent);color:#fff}

  /* ========== 履歴ページ ========== */
  #page-history{padding:12px;gap:12px;overflow-y:auto}
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;flex-shrink:0}
  .stat-card{background:var(--surface2);border-radius:var(--radius-sm);padding:13px;text-align:center}
  .stat-num{font-size:28px;font-weight:800}
  .stat-num.ok{color:var(--ok)}
  .stat-num.ng{color:var(--ng)}
  .stat-label{font-size:11px;color:var(--text2);margin-top:3px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
  .card-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
  .hl{display:flex;flex-direction:column;gap:7px}
  .hi{background:var(--surface2);border-radius:var(--radius-sm);padding:11px 13px;display:flex;gap:10px;align-items:center;border-left:3px solid}
  .hi.ok{border-left-color:var(--ok)}
  .hi.ng{border-left-color:var(--ng)}
  .hi-info{flex:1;min-width:0}
  .hi-num{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hi-time{font-size:11px;color:var(--text2);margin-top:2px}
  .hbadge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;flex-shrink:0}
  .hbadge.ok{background:var(--ok-glow);color:var(--ok)}
  .hbadge.ng{background:var(--ng-glow);color:var(--ng)}

  /* ========== 設定ページ ========== */
  #page-settings{padding:12px;gap:12px;overflow-y:auto}
  .fg{margin-bottom:12px}
  .fl{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;font-weight:600}
  .fi{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:11px 13px;font-size:14px;outline:none;transition:border-color .18s}
  .fi:focus{border-color:var(--accent)}
  .ir{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
  .ir:last-child{border-bottom:none}
  .ik{font-size:12px;color:var(--text2);flex:0 0 90px}
  .iv{font-size:13px;font-weight:600;word-break:break-all}

  /* ナビ */
  nav{background:var(--surface);border-top:1px solid var(--border);display:flex;flex-shrink:0}
  nav button{flex:1;background:none;border:none;color:var(--text2);padding:9px 0 13px;font-size:10px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .18s}
  nav button.active{color:var(--accent)}
  .ni{font-size:21px}

  /* モーダル */
  .mo{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);align-items:flex-end}
  .mo.show{display:flex}
  .md{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;padding:20px;width:100%;border-top:1px solid var(--border);animation:sup .22s ease}
  @keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .md-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}
  .md-title{font-size:16px;font-weight:700;margin-bottom:14px}

  .spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .55s linear infinite;flex-shrink:0}
  @keyframes spin{to{transform:rotate(360deg)}}

  #toast{position:fixed;top:62px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:8px 18px;font-size:13px;z-index:999;opacity:0;transition:opacity .25s;white-space:nowrap;pointer-events:none}
  #toast.show{opacity:1}
</style>
</head>
<body>

<header>
  <h1>📦 検品アプリ</h1>
  <span class="badge" id="header-count">0件完了</span>
</header>

<!-- ========== 検品ページ ========== -->
<div class="page active" id="page-scan">

  <!-- シート接続状態 -->
  <div id="sheet-status-bar">
    <div class="dot" id="ss-dot" style="background:var(--border)"></div>
    <span id="ss-text">データ読み込み中...</span>
  </div>

  <!-- 送り状番号表示バー -->
  <div id="bc-bar">
    <span class="label">📊 送り状</span>
    <span class="val ph" id="bc-val">未スキャン</span>
    <span class="step-pill pill-step1" id="step-pill">STEP 1</span>
  </div>

  <!-- カメラ -->
  <div id="camera-area">
    <div id="scanner-wrap">
      <video id="scan-video" autoplay playsinline muted></video>
      <div class="scan-guide"><div id="scan-frame" class="frame-bar"></div></div>
      <div class="camera-hint" id="camera-hint">送り状バーコードをフレームに合わせてください</div>
    </div>
  </div>

  <!-- 結果エリア（flex:1 で残りスペースを埋める） -->
  <div id="result-area">
    <!-- 待機中表示 -->
    <div id="result-idle">
      <div class="idle-icon">📷</div>
      <div class="idle-text" id="idle-text">まず送り状バーコードをスキャン</div>
    </div>
    <!-- OK/NGタップパネル（スキャン後に表示） -->
    <div id="result-tap" onclick="onTapResult()">
      <div class="tap-icon" id="tap-icon"></div>
      <div class="tap-title" id="tap-title"></div>
      <div class="tap-detail" id="tap-detail"></div>
      <div class="tap-next" id="tap-next">▶ タップして次へ</div>
    </div>
  </div>

  <!-- 操作ボタン -->
  <div id="btn-reset-wrap">
    <button class="btn btn-secondary" id="btn-manual" style="flex:1">✏️ 手動入力</button>
    <button class="btn btn-danger" id="btn-reset" style="flex:1">🔄 送り状からやり直す</button>
  </div>

</div>

<!-- ========== 履歴ページ ========== -->
<div class="page" id="page-history">
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num ok" id="stat-ok">0</div><div class="stat-label">✅ 照合OK</div></div>
    <div class="stat-card"><div class="stat-num ng" id="stat-ng">0</div><div class="stat-label">❌ 照合NG</div></div>
  </div>
  <div class="card" style="flex:1;overflow-y:auto;min-height:0">
    <div class="card-title">検品履歴</div>
    <div class="hl" id="history-list">
      <div style="text-align:center;padding:28px;color:var(--text2);font-size:13px">まだ検品記録がありません</div>
    </div>
  </div>
  <button class="btn btn-danger" id="btn-clear" style="flex-shrink:0">🗑️ 履歴をクリア</button>
</div>

<!-- ========== 設定ページ ========== -->
<div class="page" id="page-settings">
  <div class="card">
    <div class="card-title">スプレッドシート接続</div>
    <div style="background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.7">
      <div style="color:var(--text);font-weight:600;margin-bottom:4px">📋 接続先（固定）</div>
      <div>シート名：基幹システム取り込み用</div>
      <div>B列＝送り状番号 ／ C列＝受注番号</div>
    </div>
    <button class="btn btn-primary" id="btn-connect">🔗 データを再読み込み</button>
    <div id="connect-status" style="margin-top:10px"></div>
  </div>
  <div class="card" id="card-info" style="display:none">
    <div class="card-title">読み込みデータ</div>
    <div id="data-info"></div>
  </div>
</div>

<nav>
  <button class="active" id="nav-scan" onclick="showPage('scan')"><span class="ni">📷</span>検品</button>
  <button id="nav-history" onclick="showPage('history')"><span class="ni">📋</span>履歴</button>
  <button id="nav-settings" onclick="showPage('settings')"><span class="ni">⚙️</span>設定</button>
</nav>

<!-- 手動入力モーダル -->
<div class="mo" id="modal-manual">
  <div class="md">
    <div class="md-handle"></div>
    <div class="md-title">手動入力</div>
    <div class="fg"><label class="fl">送り状番号（10桁 or 12桁）</label><input class="fi" id="m-bc" placeholder="例: 8264262053" inputmode="numeric"></div>
    <div class="fg"><label class="fl">受注番号</label><input class="fi" id="m-qr" placeholder="例: 2603-050363A"></div>
    <div style="display:flex;gap:9px;margin-top:8px">
      <button class="btn btn-secondary" onclick="closeModal()" style="flex:1">キャンセル</button>
      <button class="btn btn-primary" onclick="submitManual()" style="flex:1">照合する</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

<script>
// ===========================
// 設定
// ===========================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyfogzJN4mTS-IbYhXs7FMbEPABMxuHwlitLZGbOLXbb0pazPRd3z02agHGNkDR9uvvHA/exec';

// ===========================
// 状態
// ===========================
// masterMap: bc -> Set<qr>  （1つの送り状番号に複数の受注番号が対応可能）
let masterMap = new Map();
let logs = [], statOK = 0, statNG = 0;

// スキャンフロー
// step: 'bc' = 送り状待ち  'qr' = 受注番号待ち  'result' = 結果表示中
let step = 'bc';
let currentBC = null;   // 現在スキャン中の送り状番号
let cooldown = false;
let stream = null, quaggaRunning = false, qrRaf = null, qrCanvas = null, qrCtx = null;

// ===========================
// 音
// ===========================
let AC;
function ac(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function tone(f,type,s,d,v=0.25){
  const ctx=ac(),o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  o.type=type;o.frequency.value=f;
  g.gain.setValueAtTime(v,ctx.currentTime+s);
  g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+s+d);
  o.start(ctx.currentTime+s);o.stop(ctx.currentTime+s+d);
}
function playOK()  {tone(880,'sine',0,.15);tone(1100,'sine',.12,.18);}
function playNG()  {tone(220,'sawtooth',0,.22);tone(180,'sawtooth',.26,.22);}
function playBeep(){tone(1200,'sine',0,.07,.12);}

// ===========================
// ページ切替
// ===========================
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='history') renderHistory();
}

// ===========================
// カメラ起動
// ===========================
async function startCamera(){
  try{
    // 高解像度＋連続オートフォーカスで読み取り精度向上
    const constraints = {
      video:{
        facingMode:{ideal:'environment'},
        width:{ideal:1920},
        height:{ideal:1080},
        focusMode:'continuous',
        advanced:[{focusMode:'continuous'}]
      }
    };
    stream = await navigator.mediaDevices.getUserMedia(constraints);

    // カメラトラックに直接フォーカス設定を適用（対応機種のみ）
    const track = stream.getVideoTracks()[0];
    if(track && track.applyConstraints){
      try{
        await track.applyConstraints({advanced:[{focusMode:'continuous'}]});
      }catch(e){}
    }

    const vid = document.getElementById('scan-video');
    vid.srcObject = stream;
    await new Promise(r=>{vid.readyState>=2?r():vid.addEventListener('canplay',r,{once:true})});
    startScanStep();
  }catch(e){
    document.getElementById('camera-hint').textContent = '⚠ カメラ不可 — 手動入力をご利用ください';
  }
}

// ===========================
// スキャナー切替
// ===========================
function startScanStep(){
  stopAll();
  if(step==='bc')     startQuagga();
  else if(step==='qr') startJsQR();
  // 'result'の時はスキャナー停止のまま
}

function stopAll(){
  if(quaggaRunning){try{Quagga.stop();}catch(e){}quaggaRunning=false;}
  if(qrRaf){cancelAnimationFrame(qrRaf);qrRaf=null;}
}

// ===========================
// QuaggaJS — 送り状バーコード
// ===========================
function startQuagga(){
  if(!stream) return;
  const vid = document.getElementById('scan-video');
  Quagga.init({
    inputStream:{
      type:'LiveStream',
      target:vid,
      constraints:{facingMode:'environment'},
      area:{top:'20%',right:'3%',bottom:'20%',left:'3%'}, // 中央帯のみ解析
    },
    decoder:{
      readers:['codabar_reader','code_128_reader'], // NW7=codabar、最小限に絞る
      multiple:false,
      debug:{showCanvas:false,showPatches:false,showFoundPatches:false,showSkeleton:false,showLabels:false,showPatchLabels:false,showRemainingPatchLabels:false}
    },
    locator:{
      patchSize:'large',    // NW7の太めバーに最適
      halfSample:false,     // 精度優先（速度より精度を取る）
    },
    locate:true,            // locateをtrueにして自動検出精度向上
    numOfWorkers:0,         // iOS非対応のため0
    frequency:25,           // 毎秒25フレーム
  }, err=>{
    if(err){ console.warn('Quagga:', err); return; }
    Quagga.start();
    quaggaRunning=true;
  });
  Quagga.offDetected();
  Quagga.onDetected(r=>{
    if(step!=='bc'||cooldown) return;
    onScanBC(r.codeResult.code, r.codeResult.format);
  });
}

// ===========================
// QRスキャン — BarcodeDetector優先、jsQRフォールバック
// ===========================
let nativeBD = null; // BarcodeDetector インスタンス

async function initBarcodeDetector(){
  if(!('BarcodeDetector' in window)) return false;
  try{
    const supported = await BarcodeDetector.getSupportedFormats();
    const formats = supported.filter(f=>['qr_code','data_matrix'].includes(f));
    if(!formats.length) return false;
    nativeBD = new BarcodeDetector({formats});
    return true;
  }catch(e){ return false; }
}

function startJsQR(){
  const vid = document.getElementById('scan-video');
  if(!qrCanvas){
    qrCanvas = document.createElement('canvas');
    qrCtx = qrCanvas.getContext('2d',{willReadFrequently:true});
  }
  // 解析サイズ：QRは800×600で精度と速度のバランスを取る
  const W=800, H=600;
  qrCanvas.width=W; qrCanvas.height=H;

  let lastMs=0;
  async function loop(ts){
    if(step!=='qr') return;
    if(ts-lastMs>25){ // 約40fps上限
      lastMs=ts;
      if(vid.readyState>=2){
        if(nativeBD){
          // BarcodeDetector（ネイティブ）— 最速
          try{
            const results = await nativeBD.detect(vid);
            for(const r of results){
              if(r.rawValue){ onScanQR(r.rawValue); return; }
            }
          }catch(e){}
        } else {
          // jsQR フォールバック
          qrCtx.drawImage(vid,0,0,W,H);
          const img = qrCtx.getImageData(0,0,W,H);
          const result = jsQR(img.data,W,H,{inversionAttempts:'dontInvert'});
          if(result) onScanQR(result.data);
        }
      }
    }
    qrRaf = requestAnimationFrame(loop);
  }
  qrRaf = requestAnimationFrame(loop);
}

// ===========================
// 番号抽出
// ===========================
function extractBC(raw, fmt){
  let v = raw.trim();
  if(fmt&&fmt.toLowerCase().includes('codabar'))
    v = v.replace(/^[a-dA-D]/,'').replace(/[a-dA-D]$/,'');
  return v.replace(/\D/g,'');
}

function extractQR(raw){
  const s = raw.trim().replace(/^["'\u201c]/,'');
  if(s.startsWith('9')){
    const body = s.slice(1);
    const sp = body.search(/[\s\u3000]/);
    return sp>=0 ? body.slice(0,sp) : body;
  }
  return s;
}

// ===========================
// スキャンハンドラ — 送り状
// ===========================
function onScanBC(raw, fmt){
  if(cooldown||step!=='bc') return;
  const digits = extractBC(raw, fmt);
  if(digits.length!==10 && digits.length!==12) return;

  currentBC = digits;
  setCooldown();

  // 送り状バー更新
  const bcVal = document.getElementById('bc-val');
  bcVal.textContent = digits;
  bcVal.classList.remove('ph');
  const pill = document.getElementById('step-pill');
  pill.textContent = 'STEP 2';
  pill.className = 'step-pill pill-step2';

  // カメラフレームをQR用に
  document.getElementById('scan-frame').className = 'frame-qr';
  document.getElementById('camera-hint').textContent = '受注番号QRコードをスキャンしてください';

  // 待機テキスト更新
  document.getElementById('idle-text').textContent = '受注番号QRをスキャン → タップして次へ';

  playBeep();
  flash('ok');

  step = 'qr';
  startScanStep();
}

// ===========================
// スキャンハンドラ — 受注番号QR
// ===========================
function onScanQR(raw){
  if(cooldown||step!=='qr') return;
  const val = extractQR(raw);
  if(!val||val.length<4) return;

  setCooldown();
  step = 'result';
  stopAll();

  doVerify(val);
}

function setCooldown(){cooldown=true;setTimeout(()=>cooldown=false,1800);}

// ===========================
// 照合（1:N対応）
// masterMap: bc -> Set<qr>
// ===========================
function doVerify(qr){
  const qrSet = masterMap.get(currentBC);
  const bcExists = qrSet !== undefined;
  const matched  = bcExists && qrSet.has(qr);

  const t = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const tapEl = document.getElementById('result-tap');
  const idleEl = document.getElementById('result-idle');

  idleEl.style.display = 'none';
  tapEl.style.display  = 'flex';

  if(matched){
    tapEl.className = 'ok';  // result-tap クラスはCSSで指定済み、追加でok付与
    tapEl.id = 'result-tap'; // idは維持
    tapEl.classList.add('ok');
    document.getElementById('tap-icon').textContent  = '✅';
    document.getElementById('tap-title').textContent = '照合 OK';
    document.getElementById('tap-detail').textContent = `送り状：${currentBC}\n受注番号：${qr}`;
    document.getElementById('tap-next').textContent  = '▶ タップして次のQRへ';
    playOK(); flash('ok');
    addLog('ok', currentBC, qr, t); statOK++;
  } else {
    tapEl.className = '';
    tapEl.id = 'result-tap';
    tapEl.classList.add('ng');
    const hint = !bcExists ? '送り状番号がデータに存在しません'
               : '受注番号がこの送り状に紐づいていません';
    document.getElementById('tap-icon').textContent  = '❌';
    document.getElementById('tap-title').textContent = '照合 NG';
    document.getElementById('tap-detail').textContent = `${hint}\n送り状：${currentBC}\n受注番号：${qr}`;
    document.getElementById('tap-next').textContent  = '▶ タップして次のQRへ';
    playNG(); flash('ng');
    addLog('ng', currentBC, qr, t); statNG++;
  }

  document.getElementById('stat-ok').textContent = statOK;
  document.getElementById('stat-ng').textContent = statNG;
  document.getElementById('header-count').textContent = (statOK+statNG)+'件完了';
}

// ===========================
// 結果タップ → 次のQRへ
// ===========================
function onTapResult(){
  if(step !== 'result') return;

  // 結果パネルを隠して待機に戻す
  document.getElementById('result-tap').style.display = 'none';
  document.getElementById('result-idle').style.display = '';

  step = 'qr';
  setCooldown();
  startScanStep();
}

// ===========================
// 手動入力
// ===========================
function submitManual(){
  const bc = document.getElementById('m-bc').value.trim().replace(/\D/g,'');
  const qr = document.getElementById('m-qr').value.trim();
  if(!bc||!qr){showToast('両方入力してください');return;}
  if(bc.length!==10&&bc.length!==12){showToast('送り状番号は10桁または12桁');return;}

  // 送り状が未セットの場合はセット
  if(!currentBC || step==='bc'){
    currentBC = bc;
    const bcVal = document.getElementById('bc-val');
    bcVal.textContent = bc;
    bcVal.classList.remove('ph');
    document.getElementById('step-pill').textContent = 'STEP 2';
    document.getElementById('step-pill').className = 'step-pill pill-step2';
  }

  closeModal();
  stopAll();
  step = 'result';
  doVerify(qr);
}

// ===========================
// リセット（送り状からやり直し）
// ===========================
function resetScan(){
  stopAll();
  step = 'bc'; currentBC = null; cooldown = false;

  const bcVal = document.getElementById('bc-val');
  bcVal.textContent = '未スキャン';
  bcVal.classList.add('ph');
  document.getElementById('step-pill').textContent = 'STEP 1';
  document.getElementById('step-pill').className = 'step-pill pill-step1';
  document.getElementById('scan-frame').className = 'frame-bar';
  document.getElementById('camera-hint').textContent = '送り状バーコードをフレームに合わせてください';
  document.getElementById('idle-text').textContent = 'まず送り状バーコードをスキャン';
  document.getElementById('result-tap').style.display = 'none';
  document.getElementById('result-idle').style.display = '';

  startScanStep();
}

// ===========================
// 履歴
// ===========================
function addLog(status, bc, qr, time){
  logs.unshift({status, bc, qr, time});
  if(logs.length>300) logs.pop();
}
function renderHistory(){
  const el = document.getElementById('history-list');
  if(!logs.length){
    el.innerHTML='<div style="text-align:center;padding:28px;color:var(--text2);font-size:13px">まだ検品記録がありません</div>';
    return;
  }
  el.innerHTML = logs.map(h=>`
    <div class="hi ${h.status}">
      <div class="hi-info">
        <div class="hi-num">📊 ${h.bc} ／ 📱 ${h.qr}</div>
        <div class="hi-time">${h.time}</div>
      </div>
      <div class="hbadge ${h.status}">${h.status==='ok'?'OK':'NG'}</div>
    </div>`).join('');
}

// ===========================
// Google Sheets（GAS経由）
// ===========================
function buildMap(rows){
  masterMap.clear();
  rows.forEach(r=>{
    const bc = String(r.bc||'').trim();
    const qr = String(r.qr||'').trim();
    if(!bc||!qr) return;
    if(!masterMap.has(bc)) masterMap.set(bc, new Set());
    masterMap.get(bc).add(qr);
  });
}

function updateSheetStatus(ok, msg){
  document.getElementById('ss-dot').style.background = ok?'var(--ok)':'var(--ng)';
  document.getElementById('ss-text').textContent = msg;
}

async function loadFromGAS(){
  const res = await fetch(GAS_URL);
  if(!res.ok) throw new Error('通信エラー '+res.status);
  const json = await res.json();
  if(!json.data) throw new Error('データ形式エラー');
  return json.data;
}

async function connectSheets(){
  const st = document.getElementById('connect-status');
  st.innerHTML='<div style="display:flex;align-items:center;gap:8px"><div class="spinner"></div><span style="font-size:13px;color:var(--text2)">接続中...</span></div>';
  try{
    const rows = await loadFromGAS();
    buildMap(rows);
    const total = [...masterMap.values()].reduce((s,v)=>s+v.size,0);
    st.innerHTML=`<div style="color:var(--ok);font-size:13px;font-weight:600">✅ ${total}件読み込みました</div>`;
    updateSheetStatus(true, `${total}件のデータで照合可能`);
    document.getElementById('card-info').style.display='block';
    document.getElementById('data-info').innerHTML=`
      <div class="ir"><span class="ik">件数</span><span class="iv">${total}件</span></div>
      <div class="ir"><span class="ik">最終更新</span><span class="iv">${new Date().toLocaleString('ja-JP')}</span></div>`;
    showToast(total+'件読み込みました');
  }catch(e){
    st.innerHTML=`<div style="color:var(--ng);font-size:13px">❌ ${e.message}</div>`;
    updateSheetStatus(false,'接続エラー — 再読み込みをお試しください');
  }
}

// ===========================
// モーダル・トースト
// ===========================
function closeModal(){document.getElementById('modal-manual').classList.remove('show');}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function flash(type){
  const w=document.getElementById('scanner-wrap');
  w.classList.remove('border-ok','border-ng');
  void w.offsetWidth;
  w.classList.add('border-'+type);
  setTimeout(()=>w.classList.remove('border-ok','border-ng'),550);
}

// ===========================
// イベント登録
// ===========================
document.getElementById('btn-reset').addEventListener('click', resetScan);
document.getElementById('btn-manual').addEventListener('click', ()=>{
  document.getElementById('m-bc').value = currentBC||'';
  document.getElementById('m-qr').value = '';
  document.getElementById('modal-manual').classList.add('show');
});
document.getElementById('modal-manual').addEventListener('click', e=>{
  if(e.target===document.getElementById('modal-manual')) closeModal();
});
document.getElementById('btn-connect').addEventListener('click', connectSheets);
document.getElementById('btn-clear').addEventListener('click', ()=>{
  logs=[]; statOK=0; statNG=0;
  document.getElementById('stat-ok').textContent=0;
  document.getElementById('stat-ng').textContent=0;
  document.getElementById('header-count').textContent='0件完了';
  renderHistory(); showToast('履歴をクリアしました');
});

// ===========================
// 起動
// ===========================
// データ自動読み込み
(async()=>{
  try{
    const rows = await loadFromGAS();
    buildMap(rows);
    const total = [...masterMap.values()].reduce((s,v)=>s+v.size,0);
    updateSheetStatus(true, `${total}件のデータで照合可能`);
    document.getElementById('card-info').style.display='block';
    document.getElementById('data-info').innerHTML=`
      <div class="ir"><span class="ik">件数</span><span class="iv">${total}件</span></div>
      <div class="ir"><span class="ik">最終更新</span><span class="iv">${new Date().toLocaleString('ja-JP')}</span></div>`;
    document.getElementById('connect-status').innerHTML=`<div style="color:var(--ok);font-size:13px;font-weight:600">✅ ${total}件読み込みました</div>`;
  }catch(e){
    updateSheetStatus(false,'データ未読み込み — 設定タブで再読み込みしてください');
  }
})();

// BarcodeDetector初期化してからカメラ起動
initBarcodeDetector().then(()=>startCamera());
</script>
